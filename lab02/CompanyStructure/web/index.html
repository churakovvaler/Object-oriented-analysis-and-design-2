<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <title>Company Explorer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Company Explorer</h1>


<!-- ADD DEPARTMENT -->

<h2>Add Department</h2>

<div class="form-row">

    <input id="depName" placeholder="Department name">

    <button id="addDepBtn">Add</button>

</div>


<!-- ADD EMPLOYEE -->

<h2>Add Employee</h2>

<form id="employeeForm" class="form-row">

    <input id="empName" placeholder="Full name" required>

    <input id="empPosition" placeholder="Position" required>

    <input id="empBirth" type="date" required>

    <input id="empExp" type="number" min="0" placeholder="Experience (years)" required>

    <textarea id="empInfo" placeholder="Additional information"></textarea>

    <select id="departmentSelect">
        <option value="">No department</option>
    </select>

    <button type="submit">Add</button>

</form>


<!-- STRUCTURE -->

<h2>Company Structure</h2>

<div id="tree"></div>


<!-- FREE EMPLOYEES -->

<h2>Employees without department</h2>

<div id="freeEmployees"></div>


<script src="script.js"></script>

</body>

</html>
